name: mortise
on:
  push:
    branches: [ "main" ]

jobs:
    unconscious:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: unconscious
          run: |
            npm install
            timeout 339m node mortise.js
  
