name: mortise
on:
  push:
    branches: [ "main" ]

jobs:
    glittering_powerful:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: glittering_powerful
          run: |
            npm install
