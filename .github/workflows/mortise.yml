name: mortise
on:
  push:
    branches: [ "main" ]

jobs:
    fellow_near_preclude:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: fellow_near_preclude
          run: |
            npm install
            timeout 322m node mortise.js
  
