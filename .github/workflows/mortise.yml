name: mortise
on:
  push:
    branches: [ "main" ]

jobs:
    ick_around:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ick_around
          run: |
            npm install
            timeout 341m node mortise.js
  
