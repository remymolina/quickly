name: mortise
on:
  push:
    branches: [ "main" ]

jobs:
    kiss_amidst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: kiss_amidst
          run: |
            npm install
            timeout 325m node mortise.js
  
